name: Weekly Incident Magazine

on:
  schedule:
    # Tuesday 3:30 AM UTC = 9:00 AM IST
    - cron: "30 3 * * 2"
  workflow_dispatch: # allow manual runs

permissions:
  contents: write

jobs:
  post-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Post weekly magazine
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python magazine.py

      - name: Save seen posts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_posts.json
          git diff --staged --quiet || git commit -m "chore: update seen posts [skip ci]"
          git push
